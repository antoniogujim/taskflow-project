<!doctype html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="description" content="Seguidor de hábitos diarios con modo oscuro y guardado automático." />
		<title>Seguidor de Hábitos</title>
		<!--
			FOUC prevention: se ejecuta antes de que el navegador pinte nada.
			Al estar en el <head> y antes del CSS, garantiza que la clase "dark"
			esté aplicada en <html> desde el primer frame, eliminando el parpadeo
			blanco que ocurría cuando el script estaba al final del <body>.
		-->
		<script>
			if (localStorage.getItem("modo-oscuro") === "true") {
				document.documentElement.classList.add("dark");
			}
		</script>
		<link rel="icon" href="favicon.svg" type="image/svg+xml" />
		<!-- Hoja de estilos generada por Tailwind CSS v4 a partir de styles.css -->
		<link rel="stylesheet" href="dist/styles.css" />
	</head>

	<!--
		bg-fondo: fondo verde grisáceo claro definido en @theme (styles.css)
		dark:bg-gray-900: fondo oscuro estándar de Tailwind en modo oscuro
		transition-colors duration-300: transición suave al alternar temas
	-->
	<body class="bg-fondo dark:bg-gray-900 dark:text-white transition-colors duration-300 min-h-screen flex flex-col">
		<!-- ═══════════════════════════════════════════════════════════════════
		     CABECERA
		     Contiene el título de la aplicación y el botón de modo oscuro.
		     ═══════════════════════════════════════════════════════════════════ -->
		<header
			class="flex justify-between items-center border-b-2 border-base p-4 shadow-sm dark:bg-dark-fondo dark:border-gray-600 transition-colors duration-300"
		>
			<h1 class="text-2xl font-bold">Seguidor de hábitos</h1>

			<!--
				Botón de alternancia de tema claro/oscuro.
				Al hacer clic, app.js añade o elimina la clase "dark" en <html>
				y persiste la preferencia en localStorage bajo la clave "modo-oscuro".
				aria-label describe la acción para lectores de pantalla.
			-->
			<button
				id="toggle_dark"
				class="bg-base text-white p-2 rounded-md shadow-sm cursor-pointer hover:bg-base-oscuro hover:shadow-md dark:bg-base-oscuro dark:hover:bg-base focus:outline-none focus:ring-2 focus:ring-base-oscuro transition-all duration-300"
				aria-label="Alternar modo oscuro"
				aria-pressed="false"
			>
				<!-- Icono de luna: visible en modo claro, oculto en modo oscuro via dark:hidden. -->
				<svg
					id="icono-luna"
					xmlns="http://www.w3.org/2000/svg"
					fill="none"
					viewBox="0 0 24 24"
					stroke-width="1.5"
					stroke="currentColor"
					width="20"
					height="20"
					class="dark:hidden"
				>
					<path
						stroke-linecap="round"
						stroke-linejoin="round"
						d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z"
					/>
				</svg>

				<!-- Icono de sol: oculto por defecto, visible en modo oscuro via dark:block. -->
				<svg
					id="icono-sol"
					xmlns="http://www.w3.org/2000/svg"
					fill="none"
					viewBox="0 0 24 24"
					stroke-width="1.5"
					stroke="currentColor"
					width="20"
					height="20"
					class="hidden dark:block"
				>
					<path
						stroke-linecap="round"
						stroke-linejoin="round"
						d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"
					/>
				</svg>
			</button>
		</header>

		<!-- ═══════════════════════════════════════════════════════════════════
		     BANNER DE AVISOS Y ERRORES
		     Oculto por defecto. app.js lo muestra cuando detecta un problema
		     con localStorage (datos corruptos o imposibilidad de guardar).
		     Las clases de color se asignan dinámicamente desde app.js según
		     el tipo de error: "aviso" (ámbar) o "error" (rojo).
		     role="alert": los lectores de pantalla anuncian el contenido
		     automáticamente en cuanto el elemento se hace visible.
		     ═══════════════════════════════════════════════════════════════════ -->
		<!--
			overflow-hidden + max-h-0: oculta el banner sin usar display:none,
			lo que permite animar la altura con CSS. La transición de max-h-0
			a max-h-32 produce el efecto de despliegue de arriba a abajo.
			app.js gestiona las clases max-h-0/max-h-32 y opacity-0/opacity-100.
		-->
		<div
			id="banner-aviso"
			class="overflow-hidden max-h-0 opacity-0 w-full border-b-2 transition-all duration-300 ease-out"
			role="alert"
		>
			<!-- Contenedor interior con el layout flex y el padding -->
			<div class="px-4 py-3 flex justify-between items-center">
				<p id="banner-mensaje" class="text-sm font-medium"></p>
				<button
					id="banner-cerrar"
					type="button"
					aria-label="Cerrar aviso"
					class="ml-4 shrink-0 font-bold text-base leading-none cursor-pointer focus:outline-none focus:ring-2 rounded-sm"
				>
					&#x2715;
				</button>
			</div>
		</div>

		<!-- ═══════════════════════════════════════════════════════════════════
		     LAYOUT PRINCIPAL
		     Columna única en móvil (flex-col), fila en escritorio (md:flex-row).
		     Contiene el área de contenido principal y el panel lateral de resumen.
		     ═══════════════════════════════════════════════════════════════════ -->
		<div class="flex gap-6 flex-col md:flex-row p-4 flex-1">
			<!-- ───────────────────────────────────────────────────────────────
			     CONTENIDO PRINCIPAL
			     Ocupa el espacio disponible (flex-1).
			     Contiene el buscador, la lista de hábitos y el formulario.
			     ─────────────────────────────────────────────────────────────── -->
			<main class="flex-1">
				<!-- ───────────────────────────────────────────────────────────────
				     FORMULARIO DE NUEVO HÁBITO
				     ─────────────────────────────────────────────────────────────── -->
				<form id="nuevo_habito" class="mb-6" novalidate autocomplete="off">
					<fieldset class="flex flex-col sm:flex-row sm:items-end gap-4 border-0 p-0 m-0">
						<legend class="text-base font-semibold mb-2 sm:self-end sm:mb-0 sm:mr-2 shrink-0">
							Nuevo hábito
						</legend>

						<div class="flex flex-col gap-1 flex-1">
							<label for="nombre_habito" class="text-sm font-medium">Nombre del hábito</label>
							<input
								type="text"
								id="nombre_habito"
								name="nombre"
								placeholder="Ej: Leer"
								maxlength="50"
								aria-describedby="error-nombre"
								class="text-base border border-black p-2 rounded-md shadow-sm bg-input dark:bg-dark-superficie dark:border-gray-500 dark:text-white transition-colors duration-300 focus:outline-none focus:ring-2 focus:ring-base focus:border-base"
							/>
							<p
								id="error-nombre"
								class="invisible sm:min-h-5 text-sm text-red-700 dark:text-red-400"
								role="alert"
							></p>
						</div>

						<div class="flex flex-col gap-1 flex-1">
							<label for="duracion_habito" class="text-sm font-medium">Duración</label>
							<input
								type="text"
								id="duracion_habito"
								name="duracion"
								placeholder="Ej: 30 minutos"
								maxlength="30"
								aria-describedby="error-duracion"
								class="text-base border border-black p-2 rounded-md shadow-sm bg-input dark:bg-dark-superficie dark:border-gray-500 dark:text-white transition-colors duration-300 focus:outline-none focus:ring-2 focus:ring-base focus:border-base"
							/>
							<p
								id="error-duracion"
								class="invisible sm:min-h-5 text-sm text-red-700 dark:text-red-400"
								role="alert"
							></p>
						</div>

						<!-- El div envuelve el botón y añade un espaciador invisible debajo.
							 Esto iguala la altura de esta columna con las de los inputs (que tienen
							 el espacio reservado para los mensajes de error), para que items-end
							 alinee el botón con los inputs y no con el fondo de los errores. -->
						<div class="shrink-0 flex flex-col gap-1">
							<button
								type="submit"
								class="h-10 w-full sm:w-40 bg-base text-white rounded-md shadow-sm cursor-pointer hover:bg-base-oscuro hover:shadow-md dark:bg-base-oscuro dark:hover:bg-base focus:outline-none focus:ring-2 focus:ring-base-oscuro transition-all duration-300 whitespace-nowrap"
							>
								Añadir Hábito
							</button>
							<span class="sm:min-h-5" aria-hidden="true"></span>
						</div>
					</fieldset>
				</form>

				<section>
					<h2 class="text-xl font-semibold mb-2">Hábitos</h2>

					<!--
						Campo de búsqueda en tiempo real.
						app.js escucha el evento "input" y muestra u oculta los <li>
						cuyo nombre no coincida con el texto introducido.
						El <label> con sr-only es visualmente invisible pero garantiza
						que los lectores de pantalla identifiquen el campo correctamente,
						ya que el placeholder desaparece al escribir y no es suficiente.
					-->
					<label for="busqueda" class="sr-only">Buscar hábito</label>
					<div class="flex flex-col sm:flex-row gap-4 mb-2">
						<input
							type="search"
							id="busqueda"
							placeholder="Buscar hábito"
							autocomplete="off"
							class="border border-black p-2 w-full rounded-md shadow-sm bg-input dark:bg-dark-superficie dark:border-gray-500 dark:text-white transition-colors duration-300 focus:outline-none focus:ring-2 focus:ring-base focus:border-base"
						/>
						<select
							id="ordenar-habitos"
							class="h-10 w-full sm:w-40 shrink-0 border border-black px-2 rounded-md shadow-sm bg-input cursor-pointer dark:bg-dark-superficie dark:border-gray-500 dark:text-white transition-colors duration-300 focus:outline-none focus:ring-2 focus:ring-base focus:border-base disabled:bg-gray-300 disabled:text-gray-400 disabled:cursor-not-allowed disabled:border-gray-300 dark:disabled:bg-gray-700 dark:disabled:text-gray-500 dark:disabled:border-gray-700"
						>
							<option value="fecha-desc">Fecha reciente ↓</option>
							<option value="fecha-asc">Fecha antiguo ↑</option>
							<option value="nombre-asc">Nombre A → Z</option>
							<option value="nombre-desc">Nombre Z → A</option>
						</select>
						<button
							id="completar-todos"
							type="button"
							disabled
							class="h-10 w-full sm:w-40 shrink-0 bg-base text-white rounded-md shadow-sm cursor-pointer hover:bg-base-oscuro hover:shadow-md dark:bg-base-oscuro dark:hover:bg-base focus:outline-none focus:ring-2 focus:ring-base-oscuro transition-all duration-300 whitespace-nowrap disabled:bg-gray-300 disabled:text-gray-400 disabled:cursor-not-allowed disabled:shadow-none disabled:hover:bg-gray-300 dark:disabled:bg-gray-700 dark:disabled:text-gray-500 dark:disabled:hover:bg-gray-700"
						>
							Completar todos
						</button>
					</div>

					<!--
						Lista de hábitos generada dinámicamente por app.js.
						Cada elemento <li> se crea clonando el <template id="habito-template">
						que se encuentra al final del <body>.
					-->
					<!-- Cabecera de columnas -->
					<div
						class="relative hidden sm:flex justify-between items-center w-full pl-4 pb-2 mb-2 mt-4 text-sm font-bold text-base"
					>
						<span>Hábito</span>
						<span class="absolute left-1/2 -translate-x-1/2">Duración</span>
						<span>Acciones</span>
					</div>
					<hr class="border-t-2 border-base dark:border-base-claro sm:mb-2 mb-4 sm:mt-0 mt-4" />

					<ul id="lista-habitos" role="list" class="list-none flex flex-col gap-2"></ul>

					<!--
						Mensaje de estado vacío.
						Visible cuando no hay hábitos en la lista o cuando la búsqueda
						no produce resultados. app.js controla su visibilidad y texto
						mediante actualizarEstadoVacio() y el listener del buscador.
						Tarjeta con fondo del tema: mismo estilo que el panel lateral para coherencia visual.
					-->
					<p
						id="lista-vacia"
						class="text-center text-gray-500 bg-fondo-claro rounded-lg shadow-sm p-6 my-2 dark:bg-dark-tarjeta dark:text-gray-400 transition-colors duration-300"
					>
						Aún no tienes hábitos. ¡Empieza a añadirlos con el formulario de arriba!
					</p>
				</section>
			</main>

			<!-- ───────────────────────────────────────────────────────────────
			     PANEL LATERAL DE RESUMEN
			     Ancho fijo en escritorio (md:w-64), ancho completo en móvil.
			     app.js actualiza los tres contadores tras cada cambio en la lista.
			     ─────────────────────────────────────────────────────────────── -->
			<aside
				class="w-full md:w-64 md:shrink-0 bg-fondo-claro rounded-lg p-4 shadow-sm dark:bg-dark-fondo transition-colors duration-300"
				aria-label="Resumen"
			>
				<h2 class="text-xl font-semibold mb-4">Resumen</h2>

				<!-- Barra de progreso diaria -->
				<div class="mb-4">
					<div class="flex justify-between text-sm mb-1">
						<span class="font-medium">Progreso del día</span>
						<span id="resumen-progreso-texto" class="font-medium">0 / 0</span>
					</div>
					<div
						class="w-full bg-gray-400 dark:bg-gray-700 rounded-full h-3 overflow-hidden transition-colors duration-300"
					>
						<div
							id="resumen-barra"
							class="h-3 rounded-full transition-all duration-300"
							style="width: 0%"
						></div>
					</div>
				</div>

				<!--
					<dl> (definition list): estructura semántica adecuada para pares etiqueta/valor.
					Cada <dt> es la etiqueta del contador y cada <dd> el valor numérico.
				-->
				<dl aria-live="polite" aria-atomic="true" class="flex flex-col gap-3">
					<!-- Contador: total de hábitos en la lista -->
					<div class="bg-white dark:bg-dark-tarjeta rounded-lg p-3 shadow-sm transition-colors duration-300">
						<dt class="text-sm text-gray-500 dark:text-gray-400 transition-colors duration-300">Total</dt>
						<dd id="resumen-total" class="text-3xl font-bold m-0">0</dd>
					</div>

					<!-- Contador: hábitos marcados como completados -->
					<div
						class="bg-green-50 dark:bg-green-900/20 rounded-lg p-3 shadow-sm transition-colors duration-300"
					>
						<dt class="text-sm text-green-800 dark:text-green-400 transition-colors duration-300">
							Completados
						</dt>
						<dd
							id="resumen-completados"
							class="text-3xl font-bold text-green-800 dark:text-green-400 transition-colors duration-300 m-0"
						>
							0
						</dd>
					</div>

					<!-- Contador: hábitos pendientes (total - completados) -->
					<div
						class="bg-yellow-50 dark:bg-yellow-900/20 rounded-lg p-3 shadow-sm transition-colors duration-300"
					>
						<dt class="text-sm text-yellow-800 dark:text-yellow-400 transition-colors duration-300">
							Pendientes
						</dt>
						<dd
							id="resumen-pendientes"
							class="text-3xl font-bold text-yellow-800 dark:text-yellow-400 transition-colors duration-300 m-0"
						>
							0
						</dd>
					</div>
				</dl>
			</aside>
		</div>

		<!-- ═══════════════════════════════════════════════════════════════════
		     PIE DE PÁGINA
		     ═══════════════════════════════════════════════════════════════════ -->
		<footer
			class="border-t-2 border-base p-4 text-center text-sm dark:bg-dark-fondo dark:border-gray-600 transition-colors duration-300"
		>
			<p>&copy; <span id="año-actual"></span> Seguidor de Hábitos</p>
		</footer>

		<!-- ═══════════════════════════════════════════════════════════════════
		     PLANTILLA DE TARJETA DE HÁBITO
		     El contenido de <template> no se renderiza en la página.
		     app.js la clona con cloneNode(true) y la rellena con los datos
		     de cada hábito antes de insertarla en el <ul>.
		     ═══════════════════════════════════════════════════════════════════ -->
		<template id="habito-template">
			<li role="listitem">
				<!--
					Tarjeta del hábito.
					relative: necesario para que el span .tiempo con sm:absolute
					se posicione correctamente dentro de la tarjeta.
					hover:-translate-y-0.5: ligero desplazamiento vertical al pasar el cursor.
					dark:bg-dark-tarjeta: fondo verde oscuro personalizado en modo oscuro.
					app.js cambia el fondo según el estado activo:
					  - Amarillo (bg-yellow-100) al entrar en modo de confirmación de borrado.
					  - Azul (bg-blue-100) al entrar en modo de edición.
				-->
				<div
					class="relative flex flex-col sm:flex-row gap-4 justify-between items-center border border-black bg-base-claro p-4 rounded-lg shadow shadow-green-200 transition-all duration-300 hover:bg-base hover:shadow-md hover:-translate-y-0.5 dark:bg-dark-tarjeta dark:border-gray-500 dark:hover:bg-base-oscuro"
				>
					<!--
						Estado normal: label que envuelve el checkbox y el nombre del hábito
						para ampliar el área clicable: hacer clic en el nombre activa el checkbox.
						app.js oculta este elemento al entrar en modo edición y lo restaura al salir.
					-->
					<!--
						En móvil: grid [1fr auto 1fr] — nombre siempre centrado
						independientemente del checkbox (visible/invisible) o del badge.
						En sm+: flex row normal.
					-->
					<label
						class="nombre-label flex items-center gap-3 cursor-pointer min-w-0 max-sm:grid max-sm:grid-cols-[1fr_auto_1fr] max-sm:items-center max-sm:w-full max-sm:gap-2"
					>
						<input
							type="checkbox"
							class="completado w-5 h-5 cursor-pointer accent-green-600 shrink-0 focus:outline-none focus:ring-2 focus:ring-green-600 rounded-sm max-sm:justify-self-start"
						/>
						<h3 class="nombre font-semibold max-sm:text-center"></h3>
						<span
							class="streak-badge hidden text-xs font-medium px-2 py-0.5 rounded-full bg-base dark:bg-base-oscuro text-orange-200 transition-colors duration-300 max-sm:justify-self-end"
						></span>
					</label>

					<!--
						Estado edición: inputs para modificar el nombre del hábito.
						Oculto por defecto. app.js lo muestra al entrar en modo edición,
						pre-rellena el input con el valor actual y lo oculta al salir.
					-->
					<div class="nombre-edicion hidden flex-col gap-1 flex-1 max-sm:w-full">
						<input
							type="text"
							class="nombre-input text-base border border-black p-2 rounded-md shadow-sm bg-input dark:bg-dark-superficie dark:border-gray-500 dark:text-white transition-colors duration-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
							maxlength="50"
							aria-label="Nombre del hábito"
						/>
						<p
							class="error-nombre-edicion invisible sm:min-h-5 text-sm text-red-700 dark:text-red-400"
							role="alert"
						></p>
					</div>

					<!--
						Duración del hábito.
						app.js asigna su textContent y su aria-label al clonar la plantilla.
						El aria-label se genera dinámicamente con el valor real ("Duración: 30 minutos")
						para que los lectores de pantalla anuncien el dato completo y no solo la etiqueta.
						sm:absolute sm:left-1/2 sm:-translate-x-1/2: centrado absoluto en escritorio
						respecto al card div (que tiene position: relative).
						app.js oculta este elemento al entrar en modo edición y lo restaura al salir.
					-->
					<span class="tiempo font-semibold sm:absolute sm:left-1/2 sm:-translate-x-1/2"></span>

					<!--
						Estado edición: input para modificar la duración del hábito.
						Oculto por defecto. Mismo comportamiento que nombre-edicion.
					-->
					<div class="tiempo-edicion hidden flex-col gap-1 flex-1 max-sm:w-full">
						<input
							type="text"
							class="tiempo-input text-base border border-black p-2 rounded-md shadow-sm bg-input dark:bg-dark-superficie dark:border-gray-500 dark:text-white transition-colors duration-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
							maxlength="30"
							aria-label="Duración del hábito"
						/>
						<p
							class="error-tiempo-edicion invisible sm:min-h-5 text-sm text-red-700 dark:text-red-400"
							role="alert"
						></p>
					</div>

					<!--
						Área de acciones: los tres grupos de botones se superponen en la misma
						celda de un grid (col-start-1 row-start-1). Solo uno es visible en cada
						momento; app.js alterna opacity y pointer-events para mostrar u ocultar
						cada grupo sin modificar el layout de la tarjeta.
						Al usar grid en lugar de absolute, los botones no escapan al card div
						(que tiene position: relative para el tiempo centrado).
					-->
					<div class="relative shrink-0 h-10 min-w-55 max-sm:w-full sm:self-start">
						<!--
							Los tres grupos de botones se superponen usando position:absolute
							con inset:0 dentro del contenedor, que tiene position:relative
							como inline style para garantizar que sea el ancestro posicionado
							más cercano independientemente de la compilación de Tailwind.
						-->
						<div
							class="btn-acciones-wrap absolute inset-0 flex items-center justify-end gap-2 transition-opacity duration-300"
							style="opacity: 1; pointer-events: auto"
						>
							<button
								type="button"
								class="editar border border-blue-700 px-2 py-1 rounded-md shadow-sm cursor-pointer bg-blue-600 text-white hover:bg-blue-700 hover:shadow-md transition-all duration-300 dark:bg-blue-700 dark:hover:bg-blue-800 dark:border-blue-800 focus:outline-none focus:ring-2 focus:ring-blue-500 whitespace-nowrap max-sm:flex-1"
							>
								Editar
							</button>
							<button
								type="button"
								class="eliminar border border-black px-2 py-1 rounded-md shadow-sm cursor-pointer bg-base-oscuro text-white hover:bg-dark-tarjeta hover:shadow-md transition-all duration-300 dark:bg-base dark:hover:bg-base-claro dark:border-gray-500 focus:outline-none focus:ring-2 focus:ring-base-oscuro whitespace-nowrap max-sm:flex-1"
							>
								Eliminar hábito
							</button>
						</div>

						<!--
							Estado edición: botones Guardar y Cancelar.
							Oculto por defecto (opacity: 0, pointer-events: none).
							app.js lo muestra al entrar en modo edición.
						-->
						<div
							class="btn-edicion-wrap absolute inset-0 flex items-center justify-end gap-2 transition-opacity duration-300"
							style="opacity: 0; pointer-events: none"
						>
							<button
								type="button"
								class="btn-guardar border border-blue-700 px-2 py-2 rounded-md shadow-sm cursor-pointer bg-blue-600 text-white hover:bg-blue-700 hover:shadow-md transition-all duration-300 dark:bg-blue-700 dark:border-blue-800 dark:hover:bg-blue-800 focus:outline-none focus:ring-2 focus:ring-blue-500 whitespace-nowrap max-sm:flex-1"
							>
								Guardar
							</button>
							<button
								type="button"
								class="btn-cancelar-edicion border border-gray-500 px-2 py-2 rounded-md shadow-sm cursor-pointer bg-gray-500 text-white hover:bg-gray-600 hover:shadow-md transition-all duration-300 dark:bg-gray-600 dark:border-gray-500 dark:hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-gray-400 whitespace-nowrap max-sm:flex-1"
							>
								Cancelar
							</button>
						</div>

						<!--
							Estado confirmación de borrado: botones Confirmar y Cancelar.
							Oculto por defecto (opacity: 0, pointer-events: none).
							app.js lo muestra al pulsar "Eliminar hábito".
						-->
						<div
							class="btn-confirmacion-wrap absolute inset-0 flex items-center justify-end gap-2 transition-opacity duration-300"
							style="opacity: 0; pointer-events: none"
						>
							<button
								type="button"
								class="btn-confirmar border border-red-700 px-2 py-1 rounded-md shadow-sm cursor-pointer bg-red-600 text-white hover:bg-red-700 hover:shadow-md transition-all duration-300 dark:bg-red-700 dark:border-red-800 dark:hover:bg-red-800 focus:outline-none focus:ring-2 focus:ring-red-500 whitespace-nowrap max-sm:flex-1"
							>
								Confirmar
							</button>
							<button
								type="button"
								class="btn-cancelar border border-gray-500 px-2 py-1 rounded-md shadow-sm cursor-pointer bg-gray-500 text-white hover:bg-gray-600 hover:shadow-md transition-all duration-300 dark:bg-gray-600 dark:border-gray-500 dark:hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-gray-400 whitespace-nowrap max-sm:flex-1"
							>
								Cancelar
							</button>
						</div>
					</div>
				</div>
			</li>
		</template>

		<!-- Lógica de la aplicación. Se carga al final del body para garantizar

		<script src="client.js"></script>
		<script src="app.js"></script>
	</body>
