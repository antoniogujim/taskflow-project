<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seguidor de Hábitos - API Docs</title>

  <!--
    Cargamos los estilos de Swagger UI desde un CDN (unpkg).
    Este archivo vive en public/static-docs/ para mantener el código ordenado
    y evitar confusión con el index.html principal del frontend.
    Vercel lo sirve en /api-docs gracias al rewrite configurado en vercel.json.
  -->
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">

  <!-- Tema oscuro: invierte los colores de la UI y corrige el código y las imágenes -->
  <style>
    body { background-color: #1a1a1a; }
    .swagger-ui { filter: invert(88%) hue-rotate(180deg); }
    .swagger-ui .highlight-code > .microlight,
    .swagger-ui img { filter: invert(100%) hue-rotate(180deg); }
  </style>
</head>
<body>

  <!-- Contenedor donde Swagger UI renderizará la interfaz -->
  <div id="swagger-ui"></div>

  <!--
    SDK de Swagger UI desde CDN. SwaggerUIBundle es la función principal
    que inicializa la interfaz y la monta en el div de arriba.
  -->
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>

  <script>
    SwaggerUIBundle({
      // URL del spec JSON generado por swagger-jsdoc en Express.
      // Esta ruta pasa por el rewrite /api/:path* de vercel.json
      // y llega correctamente al servidor Express.
      url: '/api/swagger-spec',
      dom_id: '#swagger-ui',
      presets: [
        SwaggerUIBundle.presets.apis,
        SwaggerUIBundle.SwaggerUIStandalonePreset
      ],
      layout: 'BaseLayout',
      // Permite enlazar directamente a una operación concreta con la URL
      deepLinking: true
    });
  </script>

</body>
</html>
