<!doctype html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Seguidor de Hábitos</title>
		<link rel="stylesheet" href="styles.css" />
	</head>
	<body>
		<header>
			<h1>Seguidor de hábitos</h1>
		</header>
		<div class="contenedor">
			<main>
				<section>
					<h2>Hábitos</h2>
					<input type="search" id="busqueda" placeholder="Buscar hábito" />
					<ul></ul>
					<form id="nuevo_habito">
						<input type="text" id="nombre_habito" placeholder="Nombre del hábito" />
						<input type="text" id="duracion_habito" placeholder="Tiempo que necesita" />
						<button>Añadir Hábito</button>
					</form>
				</section>
			</main>
			<aside>
				<h2>Resumen</h2>
				<p>Aqui mostraremos el porcentaje de habitos diarios cumplidos</p>
			</aside>
		</div>
		<script src="app.js"></script>
	</body>
</html>
