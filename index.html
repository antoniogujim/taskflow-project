<!doctype html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Seguidor de Hábitos</title>
		<link rel="stylesheet" href="styles.css" />
	</head>
	<body>
		<header>
			<h1>Seguidor de hábitos</h1>
		</header>
		<div class="contenedor">
			<main>
				<section>
					<h2>Hábitos</h2>
					<ul>
						<li>
							<div class="habito">
								<h3>Leer</h3>
								<span>1 capítulo</span>
								<span>conseguido</span>
							</div>
						</li>
						<li>
							<div class="habito">
								<h3>Correr</h3>
								<span>30 minutos</span>
								<span>conseguido</span>
							</div>
						</li>
						<li>
							<div class="habito">
								<h3>Tomar vitaminas</h3>
								<span>Instantaneo</span>
								<span>Conseguido</span>
							</div>
						</li>
					</ul>
				</section>
			</main>
			<aside>
				<h2>Resumen</h2>
				<p>Aqui mostraremos el porcentaje de habitos diarios cumplidos</p>
			</aside>
		</div>
	</body>
</html>
