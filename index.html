<!doctype html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Seguidor de Hábitos</title>
		<!--
			FOUC prevention: se ejecuta antes de que el navegador pinte nada.
			Al estar en el <head> y antes del CSS, garantiza que la clase "dark"
			esté aplicada en <html> desde el primer frame, eliminando el parpadeo
			blanco que ocurría cuando el script estaba al final del <body>.
		-->
		<script>
			if (localStorage.getItem("modo-oscuro") === "true") {
				document.documentElement.classList.add("dark");
			}
		</script>
		<!-- Hoja de estilos generada por Tailwind CSS v4 a partir de styles.css -->
		<link rel="stylesheet" href="dist/styles.css" />
	</head>

	<!--
		bg-fondo: fondo verde grisáceo claro definido en @theme (styles.css)
		dark:bg-gray-900: fondo oscuro estándar de Tailwind en modo oscuro
		transition-colors duration-300: transición suave al alternar temas
	-->
	<body class="bg-fondo dark:bg-gray-900 dark:text-white transition-colors duration-300">
		<!-- ═══════════════════════════════════════════════════════════════════
		     CABECERA
		     Contiene el título de la aplicación y el botón de modo oscuro.
		     ═══════════════════════════════════════════════════════════════════ -->
		<header
			class="flex justify-between items-center border-b-2 border-base p-4 shadow-sm dark:bg-dark-fondo dark:border-gray-600 transition-colors duration-300"
		>
			<h1 class="text-2xl font-bold">Seguidor de hábitos</h1>

			<!--
				Botón de alternancia de tema claro/oscuro.
				Al hacer clic, app.js añade o elimina la clase "dark" en <html>
				y persiste la preferencia en localStorage bajo la clave "modo-oscuro".
				aria-label describe la acción para lectores de pantalla.
			-->
			<button
				id="toggle_dark"
				class="bg-base text-white p-2 rounded-md shadow-sm cursor-pointer hover:bg-base-oscuro hover:shadow-md dark:bg-base-oscuro dark:hover:bg-base focus:outline-none focus:ring-2 focus:ring-base-oscuro transition-all duration-300"
				aria-label="Alternar modo oscuro"
			>
				<!-- Icono de luna: visible en modo claro. app.js lo oculta al activar el modo oscuro. -->
				<svg
					id="icono-luna"
					xmlns="http://www.w3.org/2000/svg"
					fill="none"
					viewBox="0 0 24 24"
					stroke-width="1.5"
					stroke="currentColor"
					width="20"
					height="20"
				>
					<path
						stroke-linecap="round"
						stroke-linejoin="round"
						d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z"
					/>
				</svg>

				<!-- Icono de sol: oculto por defecto (clase "hidden"). app.js lo muestra en modo oscuro. -->
				<svg
					id="icono-sol"
					xmlns="http://www.w3.org/2000/svg"
					fill="none"
					viewBox="0 0 24 24"
					stroke-width="1.5"
					stroke="currentColor"
					width="20"
					height="20"
					class="hidden"
				>
					<path
						stroke-linecap="round"
						stroke-linejoin="round"
						d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"
					/>
				</svg>
			</button>
		</header>

		<!-- ═══════════════════════════════════════════════════════════════════
		     BANNER DE AVISOS Y ERRORES
		     Oculto por defecto. app.js lo muestra cuando detecta un problema
		     con localStorage (datos corruptos o imposibilidad de guardar).
		     Las clases de color se asignan dinámicamente desde app.js según
		     el tipo de error: "aviso" (ámbar) o "error" (rojo).
		     role="alert": los lectores de pantalla anuncian el contenido
		     automáticamente en cuanto el elemento se hace visible.
		     ═══════════════════════════════════════════════════════════════════ -->
		<!--
			overflow-hidden + max-h-0: oculta el banner sin usar display:none,
			lo que permite animar la altura con CSS. La transición de max-h-0
			a max-h-32 produce el efecto de despliegue de arriba a abajo.
			app.js gestiona las clases max-h-0/max-h-32 y opacity-0/opacity-100.
		-->
		<div
			id="banner-aviso"
			class="overflow-hidden max-h-0 opacity-0 w-full border-b-2 transition-all duration-300 ease-out"
			role="alert"
		>
			<!-- Contenedor interior con el layout flex y el padding -->
			<div class="px-4 py-3 flex justify-between items-center">
				<p id="banner-mensaje" class="text-sm font-medium"></p>
				<button
					id="banner-cerrar"
					type="button"
					aria-label="Cerrar aviso"
					class="ml-4 shrink-0 font-bold text-base leading-none cursor-pointer focus:outline-none focus:ring-2 rounded-sm"
				>
					&#x2715;
				</button>
			</div>
		</div>

		<!-- ═══════════════════════════════════════════════════════════════════
		     LAYOUT PRINCIPAL
		     Columna única en móvil (flex-col), fila en escritorio (md:flex-row).
		     Contiene el área de contenido principal y el panel lateral de resumen.
		     ═══════════════════════════════════════════════════════════════════ -->
		<div class="flex gap-6 flex-col md:flex-row p-4">
			<!-- ───────────────────────────────────────────────────────────────
			     CONTENIDO PRINCIPAL
			     Ocupa el espacio disponible (flex-1).
			     Contiene el buscador, la lista de hábitos y el formulario.
			     ─────────────────────────────────────────────────────────────── -->
			<main class="flex-1">
				<section>
					<h2 class="text-xl font-semibold mb-2">Hábitos</h2>

					<!--
						Campo de búsqueda en tiempo real.
						app.js escucha el evento "input" y muestra u oculta los <li>
						cuyo nombre no coincida con el texto introducido.
					-->
					<input
						type="search"
						id="busqueda"
						placeholder="Buscar hábito"
						class="border border-black p-2 mb-2 w-full rounded-md shadow-sm bg-input dark:bg-dark-superficie dark:border-gray-500 dark:text-white transition-colors duration-300 focus:outline-none focus:ring-2 focus:ring-base focus:border-base"
					/>

					<!--
						Lista de hábitos generada dinámicamente por app.js.
						Cada elemento <li> se crea clonando el <template id="habito-template">
						que se encuentra al final del <body>.
					-->
					<ul id="lista-habitos" class="list-none flex flex-col gap-2"></ul>

					<!--
						Mensaje de estado vacío.
						Visible cuando no hay hábitos en la lista o cuando la búsqueda
						no produce resultados. app.js controla su visibilidad y texto
						mediante actualizarEstadoVacio() y el listener del buscador.
						Tarjeta con fondo del tema: mismo estilo que el panel lateral para coherencia visual.
					-->
					<p
						id="lista-vacia"
						class="text-center text-gray-500 bg-fondo-claro rounded-lg shadow-sm p-6 my-2 dark:bg-dark-tarjeta dark:text-gray-400 transition-colors duration-300"
					>
						Aún no tienes hábitos. ¡Empieza a añadirlos con el formulario de abajo!
					</p>

					<!-- ───────────────────────────────────────────────────────
					     FORMULARIO DE NUEVO HÁBITO
					     novalidate: desactiva la validación nativa del navegador
					     para controlar los mensajes de error desde app.js.
					     ─────────────────────────────────────────────────────── -->
					<form id="nuevo_habito" class="mt-4" novalidate>
						<fieldset class="flex flex-col gap-4 border-0 p-0 m-0">
							<legend class="text-base font-semibold mb-2">Nuevo hábito</legend>

							<!-- Campo: nombre del hábito -->
							<div class="flex flex-col gap-1">
								<label for="nombre_habito" class="text-sm font-medium">Nombre del hábito</label>
								<!--
									maxlength="50": límite de caracteres aplicado en HTML y validado en JS.
									autocomplete="off": evita sugerencias del navegador en este campo.
									aria-describedby="error-nombre": enlaza el input con su mensaje de error
									para que los lectores de pantalla lo anuncien al detectar el error.
								-->
								<input
									type="text"
									id="nombre_habito"
									name="nombre"
									placeholder="Ej: Leer"
									maxlength="50"
									autocomplete="off"
									aria-describedby="error-nombre"
									class="text-base border border-black p-2 rounded-md shadow-sm bg-input dark:bg-dark-superficie dark:border-gray-500 dark:text-white transition-colors duration-300 focus:outline-none focus:ring-2 focus:ring-base focus:border-base"
								/>
								<!--
									Mensaje de error del campo nombre.
									Permanece oculto (clase "hidden") hasta que app.js detecta
									que el campo está vacío o duplicado al enviar el formulario.
									role="alert": anuncia el mensaje automáticamente a lectores de pantalla.
								-->
								<p
									id="error-nombre"
									class="hidden text-sm text-red-700 dark:text-red-400"
									role="alert"
								></p>
							</div>

							<!-- Campo: duración del hábito -->
							<div class="flex flex-col gap-1">
								<label for="duracion_habito" class="text-sm font-medium">Duración</label>
								<!--
									maxlength="30": límite de caracteres aplicado en HTML y validado en JS.
									autocomplete="off": evita sugerencias del navegador en este campo.
									aria-describedby="error-duracion": enlaza el input con su mensaje de error.
								-->
								<input
									type="text"
									id="duracion_habito"
									name="duracion"
									placeholder="Ej: 30 minutos"
									maxlength="30"
									autocomplete="off"
									aria-describedby="error-duracion"
									class="text-base border border-black p-2 rounded-md shadow-sm bg-input dark:bg-dark-superficie dark:border-gray-500 dark:text-white transition-colors duration-300 focus:outline-none focus:ring-2 focus:ring-base focus:border-base"
								/>
								<!--
									Mensaje de error del campo duración.
									Mismo comportamiento que #error-nombre.
								-->
								<p
									id="error-duracion"
									class="hidden text-sm text-red-700 dark:text-red-400"
									role="alert"
								></p>
							</div>
						</fieldset>

						<!-- Botón de envío. Dispara el evento "submit" que gestiona app.js. -->
						<button
							type="submit"
							class="w-full mt-4 bg-base text-white p-2 rounded-md shadow-sm cursor-pointer hover:bg-base-oscuro hover:shadow-md dark:bg-base-oscuro dark:hover:bg-base focus:outline-none focus:ring-2 focus:ring-base-oscuro transition-all duration-300"
						>
							Añadir Hábito
						</button>
					</form>
				</section>
			</main>

			<!-- ───────────────────────────────────────────────────────────────
			     PANEL LATERAL DE RESUMEN
			     Ancho fijo en escritorio (md:w-64), ancho completo en móvil.
			     app.js actualiza los tres contadores tras cada cambio en la lista.
			     ─────────────────────────────────────────────────────────────── -->
			<aside
				class="w-full md:w-64 md:shrink-0 bg-fondo-claro rounded-lg p-4 shadow-sm dark:bg-dark-fondo transition-colors duration-300"
			>
				<h2 class="text-xl font-semibold mb-4">Resumen</h2>

				<!--
					<dl> (definition list): estructura semántica adecuada para pares etiqueta/valor.
					Cada <dt> es la etiqueta del contador y cada <dd> el valor numérico.
				-->
				<dl class="flex flex-col gap-3">
					<!-- Contador: total de hábitos en la lista -->
					<div class="bg-white dark:bg-dark-tarjeta rounded-lg p-3 shadow-sm transition-colors duration-300">
						<dt class="text-sm text-gray-500 dark:text-gray-400 transition-colors duration-300">Total</dt>
						<dd id="resumen-total" class="text-3xl font-bold m-0">0</dd>
					</div>

					<!-- Contador: hábitos marcados como completados -->
					<div
						class="bg-green-50 dark:bg-green-900/20 rounded-lg p-3 shadow-sm transition-colors duration-300"
					>
						<dt class="text-sm text-green-800 dark:text-green-400 transition-colors duration-300">
							Completados
						</dt>
						<dd
							id="resumen-completados"
							class="text-3xl font-bold text-green-800 dark:text-green-400 transition-colors duration-300 m-0"
						>
							0
						</dd>
					</div>

					<!-- Contador: hábitos pendientes (total - completados) -->
					<div
						class="bg-yellow-50 dark:bg-yellow-900/20 rounded-lg p-3 shadow-sm transition-colors duration-300"
					>
						<dt class="text-sm text-yellow-800 dark:text-yellow-400 transition-colors duration-300">
							Pendientes
						</dt>
						<dd
							id="resumen-pendientes"
							class="text-3xl font-bold text-yellow-800 dark:text-yellow-400 transition-colors duration-300 m-0"
						>
							0
						</dd>
					</div>
				</dl>
			</aside>
		</div>

		<!-- ═══════════════════════════════════════════════════════════════════
		     PIE DE PÁGINA
		     ═══════════════════════════════════════════════════════════════════ -->
		<footer
			class="border-t-2 border-base p-4 text-center text-sm dark:bg-dark-fondo dark:border-gray-600 transition-colors duration-300"
		>
			<p>&copy; 2026 Seguidor de Hábitos</p>
		</footer>

		<!-- ═══════════════════════════════════════════════════════════════════
		     PLANTILLA DE TARJETA DE HÁBITO
		     El contenido de <template> no se renderiza en la página.
		     app.js la clona con cloneNode(true) y la rellena con los datos
		     de cada hábito antes de insertarla en el <ul>.
		     ═══════════════════════════════════════════════════════════════════ -->
		<template id="habito-template">
			<li>
				<!--
					Tarjeta del hábito.
					hover:-translate-y-0.5: ligero desplazamiento vertical al pasar el cursor.
					dark:bg-dark-tarjeta: fondo verde oscuro personalizado en modo oscuro.
					app.js cambia el fondo a amarillo (bg-yellow-100) cuando el usuario
					pulsa "Eliminar" y la tarjeta entra en modo de confirmación.
				-->
				<div
					class="flex flex-col sm:flex-row gap-4 justify-between sm:items-center border border-black bg-base-claro p-4 rounded-lg shadow shadow-green-200 transition-all duration-300 hover:bg-base hover:shadow-md hover:-translate-y-0.5 dark:bg-dark-tarjeta dark:border-gray-500 dark:hover:bg-base-oscuro"
				>
					<!--
						El <label> envuelve el checkbox y el nombre del hábito para ampliar
						el área clicable: hacer clic en el nombre también activa el checkbox.
					-->
					<label class="flex items-center gap-3 cursor-pointer">
						<!--
							Checkbox de completado.
							app.js lee y escribe su estado en el array de hábitos
							y lo persiste en localStorage al cambiar.
							accent-green-600: colorea el tick con el verde del tema.
						-->
						<input
							type="checkbox"
							class="completado w-5 h-5 cursor-pointer accent-green-600 shrink-0 focus:outline-none focus:ring-2 focus:ring-green-600 rounded-sm"
						/>
						<!-- Nombre del hábito. app.js asigna su textContent al clonar la plantilla. -->
						<h3 class="nombre font-semibold"></h3>
					</label>

					<!-- Duración del hábito. app.js asigna su textContent al clonar la plantilla. -->
					<span class="tiempo font-semibold"></span>

					<!--
						Área de acciones: agrupa el botón eliminar y los botones de confirmación.
						Solo uno de los dos grupos es visible en cada momento; app.js los
						anima intercambiándolos con transiciones de max-width y opacity
						mediante inline styles, lo que garantiza que el CSS de Tailwind
						no necesita recompilarse para los valores de animación.
					-->
					<div class="flex items-center shrink-0">
						<!--
							Wrapper del botón eliminar.
							Visible por defecto (max-width: 160px, opacity: 1).
							app.js lo contrae a max-width: 0 al entrar en modo confirmación.
						-->
						<div class="btn-eliminar-wrap overflow-hidden transition-all duration-300" style="max-width: 160px; opacity: 1;">
							<button
								type="button"
								class="eliminar border border-black px-2 py-1 rounded-md shadow-sm cursor-pointer bg-base-oscuro text-white hover:bg-dark-tarjeta hover:shadow-md transition-all duration-300 dark:bg-base dark:hover:bg-base-claro dark:border-gray-500 focus:outline-none focus:ring-2 focus:ring-base-oscuro whitespace-nowrap"
							>
								Eliminar hábito
							</button>
						</div>

						<!--
							Wrapper de los botones de confirmación.
							Oculto por defecto (max-width: 0, opacity: 0).
							app.js lo expande a max-width: 200px al entrar en modo confirmación.
							El div interior mantiene el gap entre los dos botones sin afectar
							a la animación del wrapper exterior.
						-->
						<div class="btn-confirmacion-wrap overflow-hidden transition-all duration-300" style="max-width: 0; opacity: 0;">
							<div class="flex gap-2">
								<!--
									Botón Confirmar: rojo, indica acción destructiva.
									Misma estructura base que el botón Eliminar original.
								-->
								<button
									type="button"
									class="btn-confirmar border border-red-700 px-2 py-1 rounded-md shadow-sm cursor-pointer bg-red-600 text-white hover:bg-red-700 hover:shadow-md transition-all duration-300 dark:bg-red-700 dark:border-red-800 dark:hover:bg-red-800 focus:outline-none focus:ring-2 focus:ring-red-500 whitespace-nowrap"
								>
									Confirmar
								</button>
								<!--
									Botón Cancelar: gris neutro, indica acción segura.
									Misma estructura base que el botón Eliminar original.
								-->
								<button
									type="button"
									class="btn-cancelar border border-gray-500 px-2 py-1 rounded-md shadow-sm cursor-pointer bg-gray-500 text-white hover:bg-gray-600 hover:shadow-md transition-all duration-300 dark:bg-gray-600 dark:border-gray-500 dark:hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-gray-400 whitespace-nowrap"
								>
									Cancelar
								</button>
							</div>
						</div>
					</div>
				</div>
			</li>
		</template>

		<!-- Lógica de la aplicación. Se carga al final del body para garantizar
		    que el DOM esté disponible antes de que el script se ejecute. -->
		<script src="app.js"></script>
	</body>
</html>
